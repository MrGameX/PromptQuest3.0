<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prompt Slayer SA | Enter the DigiVerse</title>
    <style>
        body {
            background-color: #121212;
            color: #e0e0e0;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-card {
            background-color: #1e1e26;
            padding: 2rem;
            border-radius: 12px;
            text-align: center;
            border: 1px solid #333;
        }
        input {
            display: block;
            margin: 10px auto;
            padding: 10px;
            background: #2a2a35;
            border: 1px solid #444;
            color: white;
            border-radius: 5px;
            width: 80%;
        }
        button {
            background-color: #4a90e2;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <h1>Prompt Slayer SA</h1>
        <p>Enter the DigiVerse</p>
        <input type="text" placeholder="Enter Game Tag" aria-label="Game Tag">
        <input type="password" placeholder="6-Digit Passcode" maxlength="6" aria-label="Passcode">
        <button onclick="alert('Accessing DigiVerse...')">ENTER</button>
    </div>

</body><script>
    function enterDigiVerse() {
        const gameTag = document.querySelector('input[type="text"]').value;
        const passcode = document.querySelector('input[type="password"]').value;

        // Basic check: Ensure they entered a name and a 6-digit code
        if (gameTag.length > 0 && passcode.length === 6) {
            // Success: Transition to the Welcome Screen
            document.body.innerHTML = `
                <div class="login-card">
                    <h1>Welcome, ${gameTag}!</h1>
                    <p>You have entered Prompt Slayer SA.</p>
                    <button onclick="location.reload()">Start Level 1</button>
                </div>
            `;
        } else {
            alert("Please enter a valid Game Tag and a 6-digit passcode.");
        }
    }
</script>
</html>
