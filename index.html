<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prompt Slayer SA | Prompt Master 3.0</title>
    <!-- Cloudinary Widget Script -->
    <script src="https://upload-widget.cloudinary.com/global/all.js" type="text/javascript"></script>
    <style>
        body { background-color: #121212; color: #ffffff; font-family: sans-serif; margin: 0; padding: 20px; }
        #app { max-width: 900px; margin: 0 auto; background: #1e1e1e; padding: 20px; border-radius: 12px; border: 1px solid #333; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #2a2a2a; border: 1px solid #555; color: white; box-sizing: border-box; }
        button { padding: 12px 20px; background: #00ffcc; color: #000; border: none; border-radius: 5px; cursor: pointer; width: 100%; font-weight: bold; }
        .stage-row { background: #2a2a2a; padding: 15px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #444; }
    </style>
</head>
<body>

<div id="app">
    <div id="auth-portal">
        <h2 style="color: #00ffcc;">🎮 Prompt Master 3.0</h2>
        <input type="text" id="gamer-tag" placeholder="ENTER GAMERTAG">
        <input type="password" id="gamer-pin" placeholder="PIN">
        <button onclick="authenticateSession()">INITIALIZE INTERFACE</button>
    </div>
</div>

<script>
    const CLOUD_NAME = "dxfwtsyjb";
    const UPLOAD_PRESET = "w1stqo6r";
    let temporaryCoachMatrix = Array(25).fill(null);

    function authenticateSession() {
        const tag = document.getElementById('gamer-tag').value;
        const pin = document.getElementById('gamer-pin').value;

        if (tag === "Admin" && pin === "1234") {
            renderAdminPortal();
        } else {
            loadPlayerWorkspace();
        }
    }

    // --- ADMIN LOGIC ---
    function renderAdminPortal() {
        document.getElementById('app').innerHTML = `
            <h2 style="color: #00ffcc;">🔧 25-Stage Matrix Architect</h2>
            <div id="stage-builders-container" style="max-height: 500px; overflow-y: auto;"></div>
            <button onclick="commitMasterMatrix()" style="background:#38ef7d; margin-top:20px;">💾 Commit Matrix & Log Out</button>
        `;
        buildCoachAdminInterface();
    }

    function buildCoachAdminInterface() {
        const targetDiv = document.getElementById('stage-builders-container');
        const savedData = JSON.parse(localStorage.getItem('pm_master_25stage_matrix') || '[]');
        
        for (let i = 1; i <= 25; i++) {
            const row = document.createElement('div');
            row.className = "stage-row";
            row.innerHTML = `
                <strong>Stage ${i}</strong>
                <button onclick="openCloudinaryWidget(${i})" style="width: auto; background:#fff; padding:5px; margin-left:10px;">Upload Image</button>
                <div id="thumb-preview-wrap-${i}" style="${savedData[i-1]?.image ? 'display:block; margin-top:10px;' : 'display:none;'}">
                    <img id="thumb-img-${i}" src="${savedData[i-1]?.image || ''}" style="width:100px; border: 2px solid #00ffcc;">
                </div>
                <input type="text" id="keywords-input-${i}" placeholder="Keywords (comma separated)" value="${savedData[i-1]?.keywords?.join(', ') || ''}">
            `;
            targetDiv.appendChild(row);
            if(savedData[i-1]) temporaryCoachMatrix[i-1] = savedData[i-1];
        }
    }

    function openCloudinaryWidget(stageIndex) {
        cloudinary.createUploadWidget({
            cloudName: CLOUD_NAME, uploadPreset: UPLOAD_PRESET
        }, (error, result) => { 
            if (!error && result && result.event === "success") { 
                const imageUrl = result.info.secure_url;
                temporaryCoachMatrix[stageIndex - 1] = { stageNum: stageIndex, image: imageUrl, keywords: [] };
                document.getElementById(`thumb-img-${stageIndex}`).src = imageUrl;
                document.getElementById(`thumb-preview-wrap-${stageIndex}`).style.display = "block";
            }
        }).open();
    }

    function commitMasterMatrix() {
        for (let i = 1; i <= 25; i++) {
            const rowData = temporaryCoachMatrix[i - 1];
            const keywordsInput = document.getElementById(`keywords-input-${i}`).value;
            if (rowData) rowData.keywords = keywordsInput.split(',').map(k => k.trim());
        }
        localStorage.setItem('pm_master_25stage_matrix', JSON.stringify(temporaryCoachMatrix));
        location.reload();
    }

    // --- PLAYER LOGIC ---
    function loadPlayerWorkspace() {
        const savedData = JSON.parse(localStorage.getItem('pm_master_25stage_matrix') || '[]');
        
        let stagesHtml = savedData.map((stage, index) => stage ? `
            <div style="background:#2a2a2a; padding:15px; margin:10px 0; cursor:pointer;" onclick="displayStage(${index})">
                Stage ${index + 1}
            </div>` : "").join('');

        document.getElementById('app').innerHTML = `
            <h2>🎮 Player Workspace</h2>
            <div id="main-view" style="display:flex; gap:20px;">
                <div style="width:30%;">${stagesHtml}</div>
                <div id="canvas-area" style="width:70%; background:#000; padding:20px; border: 2px dashed #00ffcc;">
                    <h3>Select a stage to begin</h3>
                </div>
            </div>
        `;
    }

    function displayStage(index) {
        const savedData = JSON.parse(localStorage.getItem('pm_master_25stage_matrix') || '[]');
        const stage = savedData[index];
        document.getElementById('canvas-area').innerHTML = `
            <h3>Stage ${index + 1}</h3>
            <img src="${stage.image}" style="width:100%; max-height:300px; object-fit:contain; border:2px solid #4a90e2;">
            <textarea style="width:100%; height:100px; margin-top:10px;" placeholder="Enter your prompt here..."></textarea>
            <button onclick="alert('Prompt Submitted!')">SUBMIT PROMPT</button>
        `;
    }
</script>
</body>
</html>
