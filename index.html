<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prompt Slayer SA | Admin Matrix</title>
    <!-- Cloudinary Widget Script -->
    <script src="https://upload-widget.cloudinary.com/global/all.js" type="text/javascript"></script>
    <style>
        body { background-color: #121212; color: #e0e0e0; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        #app { width: 90%; max-width: 800px; background: #1e1e26; padding: 2rem; border-radius: 12px; border: 1px solid #333; }
        input { width: 100%; padding: 10px; margin: 10px 0; background: #2a2a35; border: 1px solid #555; color: white; box-sizing: border-box; }
        button { padding: 10px 20px; background: #4a90e2; color: white; border: none; border-radius: 5px; cursor: pointer; margin: 5px 0; width: 100%; }
    </style>
</head>
<body>

    <div id="app">
        <div id="auth-portal">
            <h1>🎮 Prompt Master 3.0</h1>
            <input type="text" id="gamer-tag" placeholder="ENTER GAMERTAG">
            <input type="password" id="gamer-pin" placeholder="PIN">
            <button onclick="authenticateSession()">INITIALIZE INTERFACE</button>
        </div>
    </div>

    <script>
        const CLOUD_NAME = "dxfwtsyjb";
        const UPLOAD_PRESET = "w1stqo6r";
        let temporaryCoachMatrix = Array(25).fill(null);

        function authenticateSession() {
            const tag = document.getElementById('gamer-tag').value;
            const pin = document.getElementById('gamer-pin').value;

            // Admin Login
            if (tag === "Admin" && pin === "1234") {
                renderAdminPortal();
            } else {
                alert("Interface Initialized for Player.");
            }
        }

        function renderAdminPortal() {
            document.getElementById('app').innerHTML = `
                <h2>🔧 25-Stage Matrix Architect</h2>
                <div id="stage-builders-container" style="max-height: 400px; overflow-y: auto;"></div>
                <button onclick="commitMasterMatrix()" style="background:#38ef7d; color:black;">💾 Commit & Exit</button>
            `;
            buildCoachAdminInterface();
        }

        function buildCoachAdminInterface() {
            const targetDiv = document.getElementById('stage-builders-container');
            const savedData = JSON.parse(localStorage.getItem('pm_master_25stage_matrix') || '[]');
            
            for (let i = 1; i <= 25; i++) {
                const row = document.createElement('div');
                row.style.cssText = "background: #2a2a2a; padding: 10px; margin-bottom: 10px; border-radius: 5px;";
                row.innerHTML = `
                    <strong>Stage ${i}</strong>
                    <button onclick="openCloudinaryWidget(${i})">Upload Image</button>
                    <div id="thumb-preview-wrap-${i}" style="${savedData[i-1]?.image ? 'display:block;' : 'display:none;'}">
                        <img id="thumb-img-${i}" src="${savedData[i-1]?.image || ''}" style="width:50px;">
                    </div>
                    <input type="text" id="keywords-input-${i}" placeholder="Keywords" value="${savedData[i-1]?.keywords?.join(', ') || ''}">
                `;
                targetDiv.appendChild(row);
                if(savedData[i-1]) temporaryCoachMatrix[i-1] = savedData[i-1];
            }
        }

        function openCloudinaryWidget(stageIndex) {
            cloudinary.createUploadWidget({
                cloudName: CLOUD_NAME, uploadPreset: UPLOAD_PRESET
            }, (error, result) => { 
                if (!error && result && result.event === "success") { 
                    const imageUrl = result.info.secure_url;
                    temporaryCoachMatrix[stageIndex - 1] = { stageNum: stageIndex, image: imageUrl, keywords: [] };
                    document.getElementById(`thumb-img-${stageIndex}`).src = imageUrl;
                    document.getElementById(`thumb-preview-wrap-${stageIndex}`).style.display = "block";
                }
            }).open();
        }

        function commitMasterMatrix() {
            for (let i = 1; i <= 25; i++) {
                const rowData = temporaryCoachMatrix[i - 1];
                const keywordsInput = document.getElementById(`keywords-input-${i}`).value;
                if (rowData) rowData.keywords = keywordsInput.split(',').map(k => k.trim());
            }
            localStorage.setItem('pm_master_25stage_matrix', JSON.stringify(temporaryCoachMatrix));
            location.reload();
        }
    </script>
</body>
</html>
